<!doctype html>
<html>
  <head>
    <title>Chat</title>
    <link rel="stylesheet" href="chat.css" />
  </head>

  <body>
    <form id="senderForm">
      <strong><label id="myName">My Name</label></strong>
      <div id="userOptions">
        <button type="button" id="btnDeleteUser" onclick="deleteUser()">
          Delete My Account
        </button>
        <button type="button" id="btnUpdateShow" onclick="updateShow()">
          Show Update Account Form
        </button>
        <button type="button" id="btnLogout" onclick="logout()">Logout</button>
      </div>
    </form>
    <form id="updateUserForm" hidden>
      <label for="username">Username</label>
      <input id="username" type="text" required />

      <br /><br />

      <label for="password">Password</label>
      <input id="password" type="password" required />

      <br /><br />
      <label for="fullname">Fullname</label>
      <input id="fullname" type="text" required />

      <br /><br />
      <label for="email">Email</label>
      <input id="email" type="email" required />

      <br /><br />
      <button type="button" id="btnUpdateUser" onclick="updateUser()">
        Update User
      </button>
      <button type="button" id="btnSup" onclick="cancel()">cancel</button>
    </form>
    <br /><br />
    <div id="Mctr">
      <div id="Lctr">
        <label for="listOfUsers">List of Users</label>

        <div id="listOfUsers"></div>
      </div>
      <div id="Cctr">
        <form id="messageDetails">
          <input id="receiverID" type="text" readonly hidden="true" />
          <strong><label id="receiverName">receiverName</label></strong>
          <br />
          <div id="chat">list of chats</div>

          <br /><br />
         <strong> <label for="newMessage">Message</label></strong>
          <input id="newMessage" type="text" required="true" />
          <button type="button" id="btnSendMsg" onclick="sendMessage()">
            send Message
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
