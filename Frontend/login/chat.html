<!doctype html>
<html>
  <head>
    <title>Chat</title>
    <link rel="stylesheet" href="chat.css">
  </head>

  <body>
    <form id="senderForm">
      <input id="myID" type="text" readonly hidden="true"/>

      <label for="myName">My Name</label>
      <input id="myName" type="text" readonly />
    </form>

    <br /><br />
    <label for="listOfUsers">List of Users</label>
    
    <div id="listOfUsers">
      
    </div>

    <br /><br />

    <form id="receiverForm">
      <input id="receiverID" type="text" readonly hidden="true"/>

      <label for="receiverName">Sending To:</label>
      <input id="receiverName" type="text" readonly="true" />
    </form>
    <br /><br />

    <div id="chat">list of chats</div>

    <br /><br />
    <form id="messageForm">
      <label for="newMessage">Type Message</label>
      <input id="newMessage" type="text" required="true" />
      <button type="button" id="btnSendMsg" onclick="sendMessage()">
        send Message
      </button>
    </form>
    <br /><br />
    <button type="button" id="btnLogout" onclick="logout()">Logout</button>

    <script src="chat.js"></script>
  </body>
</html>
